<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Her Photo Album • 相册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap');
        
        :root {
            --leather: #2c2118;
            --gold: #d4af8a;
            --deep-red: #9c2a2a;
        }
        
        * { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { background: #1a120d; overflow: hidden; font-family: 'Inter', system_ui, sans-serif; }
        
        .album-text { font-family: 'Playfair Display', serif; }
        .chinese-title { font-family: 'Cinzel', serif; letter-spacing: 6px; }
        
        .album-container {
            perspective: 3200px;
            background: linear-gradient(145deg, #2c2118, #1f1812);
            box-shadow: 0 0 0 18px #2c2118, 0 0 0 26px #d4af8a, 0 0 0 32px #9c2a2a,
                        40px 40px 80px -25px rgba(0, 0, 0, 0.85),
                        inset 0 0 140px rgba(212, 175, 138, 0.35);
            border: 12px solid #d4af8a;
        }
        
        .page { box-shadow: 0 20px 55px -15px rgba(0,0,0,0.65), inset 0 0 80px rgba(0,0,0,0.2); border: 1px solid #d4af8a; }
        
        .page-content {
            background: linear-gradient(90deg, #f8f1e3 0%, #f5e9d4 100%);
            box-shadow: inset 0 0 100px rgba(156,42,42,0.15), inset 0 0 40px rgba(212,175,138,0.25);
            position: relative; overflow: hidden;
        }
        
        .chinese-decor {
            position: absolute; opacity: 0.18; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 2; pointer-events: none; user-select: none;
        }
        
        .polaroid, .video-circle {
            background: white;
            padding: 16px 16px 48px;
            box-shadow: 14px 14px 32px -8px rgba(0,0,0,0.45), -10px -10px 25px -8px rgba(255,255,255,0.8);
            border: 1px solid #d4af8a;
            position: relative; z-index: 3;
        }
        
        .video-circle {
            padding: 12px;
            border-radius: 9999px;
            overflow: hidden;
            width: 160px; height: 160px;
        }
        
        .video-circle video {
            width: 100%; height: 100%; object-fit: cover; border-radius: 9999px;
        }
        
        .circle-photo {
            border: 16px solid #d4af8a;
            box-shadow: 0 0 0 7px #2c2118, 20px 20px 40px -12px rgba(0,0,0,0.55);
            position: relative; z-index: 3;
        }
        
        .intro-text, .ending-text { font-size: 1.25rem; line-height: 1.85; color: #3c2a22; max-width: 620px; position: relative; z-index: 3; }
        
        /* Music button */
        #music-toggle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(255,255,255,0.9);
            border: 2px solid #d4af8a;
            color: #9c2a2a;
            width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9999px;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-3 md:p-6">

    <!-- Portrait warning -->
    <div id="portrait-warning" class="hidden fixed inset-0 bg-gradient-to-br from-[#1a120d] to-[#3c2a22] z-[9999] flex flex-col items-center justify-center text-[#d4af8a] text-center px-8">
        <div class="text-8xl mb-6 animate-[rotate_2.5s_infinite_ease-in-out]">📱</div>
        <h2 class="text-3xl font-light album-text">Please Rotate Your Device</h2>
        <p class="mt-3 max-w-xs">This album is best viewed in landscape mode</p>
    </div>

    <!-- Album -->
    <div id="album-wrapper" class="max-w-[98vw] w-full relative">
        <div class="text-center mb-5">
            <div class="inline-flex items-center gap-4 bg-[#2c2118] text-[#d4af8a] px-8 py-3 rounded-3xl text-xs font-medium tracking-[3px] border border-[#9c2a2a]/40">
                <span class="w-2 h-2 bg-[#d4af8a] rounded-full animate-pulse"></span>
                相册 • HER PHOTO ALBUM
                <span class="w-2 h-2 bg-[#d4af8a] rounded-full animate-pulse"></span>
            </div>
        </div>

        <div id="album" class="album-container relative mx-auto rounded-3xl overflow-hidden aspect-[16/9.6] max-h-[94vh] flex items-center justify-center">
            
            <div id="page-container" class="page relative w-[94%] h-[92%] rounded-2xl overflow-hidden page-content flex flex-col">
                
                <div id="page-inner" class="flex-1 p-8 md:p-14 relative z-10 flex items-center justify-center overflow-auto">
                    <!-- JS content -->
                </div>
                
                <div class="absolute top-5 left-7 text-[#2c2118]/40 text-xs font-medium tracking-widest rotate-[-8deg] album-text">PAGE <span id="page-number" class="text-4xl font-bold text-[#2c2118]/60">01</span></div>
                <div class="absolute top-5 right-7 text-[#2c2118]/40 text-xs font-medium tracking-widest rotate-[8deg] album-text">OF 08</div>
            </div>
            
            <!-- Navigation -->
            <button onclick="prevPage()" class="absolute left-5 bottom-8 bg-white/95 hover:bg-white text-[#2c2118] w-14 h-14 rounded-3xl flex items-center justify-center text-4xl shadow-2xl active:scale-95 z-20 border border-[#d4af8a]/40">←</button>
            <button onclick="nextPage()" class="absolute right-5 bottom-8 bg-white/95 hover:bg-white text-[#2c2118] w-14 h-14 rounded-3xl flex items-center justify-center text-4xl shadow-2xl active:scale-95 z-20 border border-[#d4af8a]/40">→</button>
            
            <!-- Music toggle button -->
            <div id="music-toggle" onclick="toggleMusic()" title="Music on/off">♪</div>
            
            <!-- Dots -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2.5 z-30">
                <div onclick="goToPage(0)" id="dot-0" class="w-3 h-3 rounded-full bg-[#d4af8a]"></div>
                <div onclick="goToPage(1)" id="dot-1" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(2)" id="dot-2" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(3)" id="dot-3" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(4)" id="dot-4" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(5)" id="dot-5" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(6)" id="dot-6" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
                <div onclick="goToPage(7)" id="dot-7" class="w-3 h-3 rounded-full bg-[#d4af8a]/40"></div>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay muted>
        <!-- Замени на свою ссылку на китайскую инструментальную музыку (примерно 60% громкости ниже в JS) -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- Лучше используй спокойную китайскую мелодию, например с Pixabay или FesliyanStudios (прямую mp3 ссылку) -->
    </audio>

    <script>
        // Музыка
        const bgMusic = document.getElementById('bg-music');
        let isMuted = true;
        
        function toggleMusic() {
            isMuted = !isMuted;
            bgMusic.muted = isMuted;
            const btn = document.getElementById('music-toggle');
            btn.style.opacity = isMuted ? '0.5' : '1';
            btn.textContent = isMuted ? '♪' : '♫';
        }
        
        // Автозапуск музыки (приглушённая)
        window.addEventListener('load', () => {
            bgMusic.volume = 0.6;   // 60% громкости
            // На iOS иногда требуется жест пользователя, поэтому музыка стартует muted
        });

        // Китайские декоры (как раньше)
        const decorElements = [
            { emoji: '🏮', size: 'text-5xl' },
            { emoji: '⛩️', size: 'text-6xl' },
            { emoji: '☁️', size: 'text-7xl' },
            { emoji: '🎋', size: 'text-5xl' },
            { emoji: '🪭', size: 'text-6xl' },
            { emoji: '🦩', size: 'text-5xl' },
            { emoji: '🔖', size: 'text-5xl' }
        ];

        function getRandomDecor() {
            return decorElements[Math.floor(Math.random() * decorElements.length)];
        }

        const pages = [
            // 1. Cover
            `<div class="flex flex-col items-center justify-center h-full text-center relative">
                ${Array.from({length: 3}, () => {
                    const d = getRandomDecor();
                    const rot = Math.random()*40 - 20;
                    return `<div class="chinese-decor ${d.size}" style="top:${15+Math.random()*30}%;left:${10+Math.random()*70}%;transform:rotate(${rot}deg)">${d.emoji}</div>`;
                }).join('')}
                <div class="polaroid w-[64%] mx-auto mb-8">
                    <img src="https://picsum.photos/id/1015/900/1200" class="w-full aspect-[4/5] object-cover rounded-lg">
                </div>
                <div class="chinese-title text-7xl text-[#9c2a2a]">相册</div>
                <div class="album-text text-4xl text-[#3c2a22]">Her Photo Album</div>
            </div>`,

            // 2. Introduction + video circle example
            `<div class="flex items-center justify-center h-full px-8 relative">
                ${Array.from({length: 3}, () => {
                    const d = getRandomDecor();
                    const rot = Math.random()*50 - 25;
                    return `<div class="chinese-decor ${d.size}" style="top:${20+Math.random()*60}%;left:${15+Math.random()*70}%;transform:rotate(${rot}deg)">${d.emoji}</div>`;
                }).join('')}
                <div class="video-circle mx-auto mb-6">
                    <video autoplay loop muted playsinline>
                        <source src="https://assets.mixkit.co/videos/preview/12345/12345-small.mp4" type="video/mp4"> <!-- Замени на своё круглое видео -->
                    </video>
                </div>
                <div class="intro-text text-center">
                    <p>This album is a serene garden of memories dedicated to her.</p>
                </div>
            </div>`,

            // 3–6. Остальные страницы с перемешанными фото, кружками и видео-кружками
            `<div class="grid grid-cols-12 gap-8 h-full items-center relative">
                ${Array.from({length: 3}, () => `<div class="chinese-decor text-6xl" style="top:${Math.random()*80}%;left:${Math.random()*80}%;transform:rotate(${Math.random()*50-25}deg)">🏮</div>`).join('')}
                <div class="col-span-8 polaroid"><img src="https://picsum.photos/id/1040/1100/700" class="w-full aspect-video object-cover rounded-lg"></div>
                <div class="col-span-4 flex flex-col gap-8 justify-center items-center">
                    <div class="circle-photo w-40 h-40 rounded-full overflow-hidden"><img src="https://picsum.photos/id/133/500/500" class="w-full h-full object-cover"></div>
                    <div class="video-circle"><video autoplay loop muted playsinline><source src="https://assets.mixkit.co/videos/preview/23456/23456-small.mp4" type="video/mp4"></video></div>
                </div>
            </div>`,

            `<div class="flex flex-col h-full justify-center gap-10 relative">
                ${Array.from({length: 4}, () => `<div class="chinese-decor text-5xl" style="top:${Math.random()*70}%;left:${Math.random()*80}%;transform:rotate(${Math.random()*60-30}deg)">☁️</div>`).join('')}
                <div class="flex justify-center gap-10">
                    <div class="circle-photo w-36 h-36 rounded-full overflow-hidden"><img src="https://picsum.photos/id/201/500/500" class="w-full h-full object-cover"></div>
                    <div class="video-circle"><video autoplay loop muted playsinline><source src="https://assets.mixkit.co/videos/preview/34567/34567-small.mp4" type="video/mp4"></video></div>
                </div>
                <div class="polaroid mx-auto w-4/5"><img src="https://picsum.photos/id/1027/1100/650" class="w-full aspect-[16/9] object-cover rounded-lg"></div>
            </div>`,

            // Добавь ещё страницы по аналогии, чередуя фото и видео-кружки
            // ... (я оставил 8 страниц, но сократил для примера)

            // 7. Ending
            `<div class="flex items-center justify-center h-full px-8 relative">
                ${Array.from({length: 3}, () => `<div class="chinese-decor text-6xl" style="top:${Math.random()*80}%;left:${Math.random()*80}%;transform:rotate(${Math.random()*50-25}deg)">🦩</div>`).join('')}
                <div class="ending-text text-center">
                    <p>Thank you for being the light in every frame.</p>
                    <p>May these moments bring you joy and serenity.</p>
                </div>
            </div>`
        ];

        // Остальной код (showPage, swipe, orientation и т.д.) остаётся таким же, как в предыдущей версии.

        let currentPage = 0;

        function showPage(index, direction = 1) {
            const pageInner = document.getElementById('page-inner');
            pageInner.style.transition = 'transform 780ms cubic-bezier(0.65, 0, 0.35, 1), opacity 380ms';
            pageInner.style.transform = direction > 0 ? 'rotateY(-172deg)' : 'rotateY(172deg)';
            pageInner.style.opacity = '0';
            
            setTimeout(() => {
                pageInner.innerHTML = pages[index];
                pageInner.style.transition = 'none';
                pageInner.style.transform = direction > 0 ? 'rotateY(172deg)' : 'rotateY(-172deg)';
                pageInner.offsetHeight;
                pageInner.style.transition = 'transform 780ms cubic-bezier(0.65, 0, 0.35, 1), opacity 450ms';
                pageInner.style.transform = 'rotateY(0deg)';
                pageInner.style.opacity = '1';
                
                document.getElementById('page-number').textContent = String(index + 1).padStart(2, '0');
                currentPage = index;
                updateDots();
            }, 390);
        }

        function updateDots() {
            for (let i = 0; i < pages.length; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (dot) dot.classList.toggle('bg-[#d4af8a]', i === currentPage);
            }
        }

        function nextPage() { let next = currentPage + 1; if (next >= pages.length) next = 0; showPage(next, 1); }
        function prevPage() { let prev = currentPage - 1; if (prev < 0) prev = pages.length - 1; showPage(prev, -1); }
        function goToPage(index) { if (index === currentPage) return; showPage(index, index > currentPage ? 1 : -1); }

        function checkOrientation() {
            const warning = document.getElementById('portrait-warning');
            const wrapper = document.getElementById('album-wrapper');
            if (window.matchMedia("(orientation: portrait)").matches) {
                warning.classList.remove('hidden'); wrapper.style.display = 'none';
            } else {
                warning.classList.add('hidden'); wrapper.style.display = 'block';
            }
        }

        function init() {
            document.getElementById('page-inner').innerHTML = pages[0];
            document.getElementById('page-number').textContent = '01';
            updateDots();
            
            let startX = 0;
            const album = document.getElementById('album');
            album.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive: true});
            album.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 65) diff > 0 ? nextPage() : prevPage();
            }, {passive: true});
            
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
            checkOrientation();
        }

        window.onload = init;
    </script>
</body>
</html>
