<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Her Photo Album • 相册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap');
        
        :root {
            --leather: #2c2118;
            --gold: #d4af8a;
            --deep-red: #9c2a2a;
        }
        
        * { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { background: #1a120d; overflow: hidden; font-family: 'Inter', system_ui, sans-serif; }
        
        .album-text { font-family: 'Playfair Display', serif; }
        .chinese-title { font-family: 'Cinzel', serif; letter-spacing: 6px; }
        
        .album-container {
            perspective: 3200px;
            background: linear-gradient(145deg, #2c2118, #1f1812);
            box-shadow: 0 0 0 18px #2c2118, 0 0 0 26px #d4af8a, 0 0 0 32px #9c2a2a,
                        40px 40px 80px -25px rgba(0,0,0,0.85),
                        inset 0 0 140px rgba(212,175,138,0.35);
            border: 12px solid #d4af8a;
        }
        
        .page { box-shadow: 0 20px 55px -15px rgba(0,0,0,0.65), inset 0 0 80px rgba(0,0,0,0.2); border: 1px solid #d4af8a; }
        
        .page-content {
            background: linear-gradient(90deg, #f8f1e3 0%, #f5e9d4 100%);
            box-shadow: inset 0 0 100px rgba(156,42,42,0.15), inset 0 0 40px rgba(212,175,138,0.25);
            position: relative; overflow: hidden;
        }
        
        .chinese-decor {
            position: absolute; 
            opacity: 0.16; 
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
            z-index: 2; 
            pointer-events: none;
            user-select: none;
        }
        
        .polaroid {
            background: white; 
            padding: 16px 16px 48px;
            box-shadow: 14px 14px 32px -8px rgba(0,0,0,0.45), -10px -10px 25px -8px rgba(255,255,255,0.8);
            border: 1px solid #d4af8a; 
            position: relative; z-index: 3;
        }
        
        .video-circle, .circle-photo {
            background: white; 
            padding: 12px; 
            border-radius: 9999px; 
            overflow: hidden;
            width: 158px; height: 158px; 
            border: 14px solid #d4af8a;
            box-shadow: 0 0 0 6px #2c2118, 18px 18px 35px -10px rgba(0,0,0,0.5);
            position: relative; z-index: 3;
        }
        
        .video-circle video { width: 100%; height: 100%; object-fit: cover; border-radius: 9999px; }
        
        .intro-text, .ending-text { 
            font-size: 1.22rem; 
            line-height: 1.82; 
            color: #3c2a22; 
            max-width: 620px; 
            z-index: 3; 
            text-align: center;
        }
        
        /* Новый стиль управления музыкой */
        #music-control {
            position: absolute; 
            bottom: 24px; 
            right: 24px; 
            z-index: 50;
            width: 46px; 
            height: 46px;
            background: rgba(255,255,255,0.95); 
            border: 2px solid #d4af8a;
            color: #9c2a2a; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 9999px;
            font-size: 26px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        #portrait-warning {
            position: fixed; inset: 0; background: linear-gradient(135deg, #1a120d, #3c2a22);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            flex-direction: column; color: #d4af8a; text-align: center; padding: 40px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-3">

    <!-- Portrait warning -->
    <div id="portrait-warning">
        <div class="text-8xl mb-6">📱</div>
        <h2 class="text-3xl font-light album-text">Please Rotate Your Device</h2>
        <p class="mt-3">This album is best viewed in landscape mode</p>
    </div>

    <div id="album-wrapper" class="max-w-[98vw] w-full relative">
        <div class="text-center mb-5">
            <div class="inline-flex items-center gap-4 bg-[#2c2118] text-[#d4af8a] px-8 py-3 rounded-3xl text-xs font-medium tracking-[3px]">
                相册 • HER PHOTO ALBUM
            </div>
        </div>

        <div id="album" class="album-container relative mx-auto rounded-3xl overflow-hidden aspect-[16/9.6] max-h-[94vh]">
            
            <div id="page-container" class="page relative w-[94%] h-[92%] rounded-2xl overflow-hidden page-content">
                <div id="page-inner" class="flex-1 p-8 md:p-14 relative z-10 flex items-center justify-center overflow-auto"></div>
                
                <div class="absolute top-5 left-7 text-[#2c2118]/40 text-xs font-medium tracking-widest rotate-[-8deg]">PAGE <span id="page-number" class="text-4xl font-bold">01</span></div>
                <div class="absolute top-5 right-7 text-[#2c2118]/40 text-xs font-medium tracking-widest rotate-[8deg]">OF 22</div>
            </div>
            
            <!-- Navigation -->
            <button onclick="prevPage()" class="absolute left-6 bottom-8 bg-white/95 hover:bg-white w-14 h-14 rounded-3xl flex items-center justify-center text-4xl shadow-2xl z-20">←</button>
            <button onclick="nextPage()" class="absolute right-6 bottom-8 bg-white/95 hover:bg-white w-14 h-14 rounded-3xl flex items-center justify-center text-4xl shadow-2xl z-20">→</button>
            
            <!-- Music control - новый минималистичный вариант -->
            <div id="music-control" onclick="toggleMusic()" title="Toggle music">♪</div>
            
            <!-- Dots -->
            <div id="dots-container" class="absolute bottom-7 left-1/2 -translate-x-1/2 flex gap-1.5 z-30 overflow-x-auto max-w-[75%] pb-1"></div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- Замени на свою спокойную китайскую мелодию -->
    </audio>

    <script>
        const bgMusic = document.getElementById('bg-music');
        let musicOn = true;
        
        function toggleMusic() {
            musicOn = !musicOn;
            bgMusic.muted = !musicOn;
            const control = document.getElementById('music-control');
            control.style.opacity = musicOn ? '1' : '0.45';
            control.style.transform = musicOn ? 'scale(1)' : 'scale(0.85)';
        }

        // Китайские эмодзи
        const decorPool = ['🏮','⛩️','☁️','🎋','🪭','🦩','🔖','🌸','🏯','🧧','🕯️','🐉','🍵','🪔','🌺'];

        function createRandomDecors(count = 4) {
            let html = '';
            for (let i = 0; i < count; i++) {
                const decor = decorPool[Math.floor(Math.random() * decorPool.length)];
                const top = 6 + Math.random() * 82;
                const left = 6 + Math.random() * 82;
                const rotate = Math.random() * 70 - 35;
                const sizeClass = ['text-4xl','text-5xl','text-6xl'][Math.floor(Math.random()*3)];
                html += `<div class="chinese-decor ${sizeClass}" style="top:${top}%; left:${left}%; transform:rotate(${rotate}deg)">${decor}</div>`;
            }
            return html;
        }

        const pages = [];
        
        // 1. Обложка
        pages.push(`
            <div class="flex flex-col items-center justify-center h-full text-center relative">
                ${createRandomDecors(5)}
                <div class="polaroid w-[62%] mx-auto mb-8">
                    <img src="https://picsum.photos/id/1015/900/1200" class="w-full aspect-[4/5] object-cover rounded-lg">
                </div>
                <div class="chinese-title text-7xl text-[#9c2a2a]">相册</div>
                <div class="album-text text-4xl text-[#3c2a22] mt-1">Her Photo Album</div>
            </div>`);
        
        // 2. Введение (без видео)
        pages.push(`
            <div class="flex items-center justify-center h-full px-8 relative">
                ${createRandomDecors(5)}
                <div class="intro-text">
                    <p class="mb-8">This album is a serene garden of memories dedicated only to her — her smiles, her light, and her beautiful presence.</p>
                    <p>Turn the pages slowly and enjoy every moment.</p>
                </div>
            </div>`);
        
        // Страницы 3–20: основные (фото + видео-кружочки + случайные декоры)
        for (let i = 3; i <= 20; i++) {
            pages.push(`
                <div class="grid grid-cols-12 gap-8 h-full items-center relative">
                    ${createRandomDecors(5)}
                    <div class="col-span-7 polaroid">
                        <img src="https://picsum.photos/id/${980 + i*7}/1100/720" class="w-full aspect-video object-cover rounded-lg">
                    </div>
                    <div class="col-span-5 flex flex-col gap-10 items-center justify-center">
                        <div class="circle-photo w-40 h-40 rounded-full overflow-hidden">
                            <img src="https://picsum.photos/id/${1050 + i*4}/500/500" class="w-full h-full object-cover">
                        </div>
                        <div class="video-circle">
                            <video autoplay loop muted playsinline>
                                <source src="https://assets.mixkit.co/videos/preview/12345/12345-small.mp4" type="video/mp4">
                            </video>
                        </div>
                    </div>
                </div>`);
        }
        
        // 21. Завершение (без видео)
        pages.push(`
            <div class="flex items-center justify-center h-full px-8 relative">
                ${createRandomDecors(5)}
                <div class="ending-text">
                    <p class="mb-8">Thank you for being the light in every frame.</p>
                    <p>May these moments always bring you warmth and serenity.</p>
                    <div class="mt-12 text-[#9c2a2a]/60 text-sm tracking-widest">THE END • 永恒</div>
                </div>
            </div>`);
        
        let currentPage = 0;
        
        function showPage(index, direction = 1) {
            const inner = document.getElementById('page-inner');
            inner.style.transition = 'transform 820ms cubic-bezier(0.65,0,0.35,1), opacity 380ms';
            inner.style.transform = direction > 0 ? 'rotateY(-175deg)' : 'rotateY(175deg)';
            inner.style.opacity = '0';
            
            setTimeout(() => {
                inner.innerHTML = pages[index];
                inner.style.transition = 'none';
                inner.style.transform = direction > 0 ? 'rotateY(175deg)' : 'rotateY(-175deg)';
                inner.offsetHeight;
                inner.style.transition = 'transform 820ms cubic-bezier(0.65,0,0.35,1), opacity 450ms';
                inner.style.transform = 'rotateY(0deg)';
                inner.style.opacity = '1';
                
                document.getElementById('page-number').textContent = String(index + 1).padStart(2, '0');
                currentPage = index;
                updateDots();
            }, 420);
        }
        
        function updateDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for (let i = 0; i < pages.length; i++) {
                const dot = document.createElement('div');
                dot.className = `w-2.5 h-2.5 rounded-full flex-shrink-0 cursor-pointer transition-all ${i === currentPage ? 'bg-[#d4af8a] scale-125' : 'bg-[#d4af8a]/30'}`;
                dot.onclick = () => goToPage(i);
                container.appendChild(dot);
            }
        }
        
        function nextPage() { let next = currentPage + 1; if (next >= pages.length) next = 0; showPage(next, 1); }
        function prevPage() { let prev = currentPage - 1; if (prev < 0) prev = pages.length - 1; showPage(prev, -1); }
        function goToPage(i) { if (i === currentPage) return; showPage(i, i > currentPage ? 1 : -1); }
        
        function checkOrientation() {
            const warn = document.getElementById('portrait-warning');
            const wrap = document.getElementById('album-wrapper');
            if (window.matchMedia("(orientation: portrait)").matches) {
                warn.style.display = 'flex';
                wrap.style.display = 'none';
            } else {
                warn.style.display = 'none';
                wrap.style.display = 'block';
            }
        }
        
        function init() {
            document.getElementById('page-inner').innerHTML = pages[0];
            document.getElementById('page-number').textContent = '01';
            updateDots();
            
            bgMusic.volume = 0.58;
            bgMusic.play().catch(() => {});
            
            let startX = 0;
            const album = document.getElementById('album');
            album.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive: true});
            album.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 70) diff > 0 ? nextPage() : prevPage();
            }, {passive: true});
            
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
            checkOrientation();
        }
        
        window.onload = init;
    </script>
</body>
</html>
